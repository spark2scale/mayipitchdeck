[build]
builder = "NIXPACKS"
buildCommand = "cd server && npm ci && npx playwright install chromium"

[deploy]
startCommand = "cd server && npx tsx src/index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/api/health"
initialDelaySeconds = 5
timeoutSeconds = 10
